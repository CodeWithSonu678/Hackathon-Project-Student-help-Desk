<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Register</title>
  <link rel="stylesheet" href="../CSS/register-form.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container">
  <h2>Create New Account</h2>
  <p class="subtitle">Register as a college or student</p>


  <div class="sections">
    <a href="college-register.html" class="active">College</a>
    <a href="student-register.html">Student</a>
  </div>

  <form>

    <div class="row">
      <div class="input-box">
        <label>College Name</label>
        <input type="text" placeholder="Enter college name">
      </div>

      <div class="input-box">
        <label>College Code</label>
        <input type="text" placeholder="Enter college code">
      </div>
    </div>

    <div class="row">
    <div class="input-box">
      <label for="">Program</label>
      <select name="" id="">
        <option value="">Select Program</option>
        <option value="">Post Graduation</option>
        <option value="">Under Graduation</option>
      </select>
    
    </div>

    <div class="input-box">
      <label>Board</label>
      <select>
        <option>Select board</option>
        <option>UP Board</option>
        <option>CBSE</option>
        <option>ICSE</option>
      </select>
    </div>
    </div>

    <div class="row">
      <div class="input-box">
        <label for="">Course</label>
        <select name="" id="">
          <option value="">Select Course</option>
          <option value="">B-Tech</option>
          <option value="">M-Tech</option>
          <option value="">Diploma</option>
        </select>
      </div>


    <div class="input-box">
      <label for="">Branch</label>
      <select name="" id="">
      <option value="">Select Branch</option>
      <option value="">Computer Science & Engineering</option>
      <option value="">Civil Engineering</option>
      <option value="">Mechanical Engineering</option>
      </select>
    </div>

    </div>

    <div class="row">
    <div class="input-box">
      <label>Email</label>
      <input type="email" placeholder="college@example.com">
    </div>

    <div class="input-box">
      <label>Address</label>
      <input type="text" placeholder="Enter full address">
    </div>
    </div>

    <div class="row">
      <div class="input-box">
        <label>Create Password</label>
        <input type="password" placeholder="Create Password">
      </div>

      <div class="input-box">
        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm Password">
      </div>
    </div>

    <div class="row">
      <div class="input-box">
        <label>OTP</label>
        <input type="text" placeholder="Enter OTP">
      </div>

      <div class="input-box">
        <label>Captcha Code</label>
        <div class="captcha-box">
          <span>K7M94X</span>
          <input type="text" placeholder="Enter Captcha Code">
        </div>
      </div>
    </div>

    <button class="reg-btn">Register College</button>

  </form>

  <p class="login">Already have an account? <a href="login-form.html">Login here</a></p>
</div>

</body>
</html>
