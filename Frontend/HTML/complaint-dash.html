<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../CSS/complaint-dash.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="../CSS/std-nav.css">
</head>

<body>
  <div class="body-dash-student">

    <!-- Nav Bar -->
     <div id="header"></div>
   

    <!-- Student Info -->

    <div class="outer-dash">
      
      <div class="container">

        <h2>Complaints & Requests</h2>
        <p class="subtitle">Raise issues related to college or hostel facilities</p>

        <div class="tabs">
          <a href="request-dash.html" style="text-decoration: none; color: black;"><button class="tab">My Complaints</button></a>
          <button class="tab active">Raise New</button>
        </div>

        <div class="card">
          <h3>Submit a New Request</h3>
          <p class="desc">Fill out the details below. We'll look into it as soon as possible.</p>

          <form>
            <label>Category</label>
            <select>
              <option>Select category (e.g. Hostel, Academics)</option>
            </select>

            <label>Subject</label>
            <input type="text" placeholder="Brief summary of the issue">

            <label>Detailed Description</label>
            <textarea placeholder="Explain your issue in detail..."></textarea>

            <button class="submit-btn">Submit Complaint</button>
          </form>
        </div>

      </div>
    </div>
  </div>

</body>
  <script src="../JS/complaint-dash.js"></script>
  <script src="../JS/std-nav.js"></script>
</html>
