<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form</title>
  <link rel="stylesheet" href="../CSS/login-form.css">
</head>
<body>

<div class="container">
  
 
  <div class="left-section">
    <div class="form-box">
      <h3>Login to Your Account</h3>
      <p>Choose your account type and sign in</p>

     <div class="sections">
    <a href="login-form.html">College</a>
    <a href="#" class="active">Student</a>
  </div>


      <form>
        <label>Email</label>
        <input type="email" placeholder="Enter your email">

        <label>Password</label>
        <input type="password" placeholder="Enter your password">

        <label>OTP (Sent to Email)</label>
        <input type="text" placeholder="Enter OTP">

        <label>Captcha</label>
        <div class="captcha-box">
          <span>5hK9P</span>
          <input type="text" placeholder="Enter captcha">
        </div>

        <button class="login-btn">Login</button>

        <a href="#" class="forgot">Forgot Password?</a>

        <p class="register-section">
          Don't have an account? <a href="#" class="register">Register here</a>
        </p>
      </form>
    </div>
  </div>

  <div class="right-section">
    <div class="content">
      <h2>Secure Access to Your Academic Portal</h2>
      <p>
        Manage attendance, fees, results, and campus operations
        in one unified, secure platform designed for modern education.
      </p>
    </div>
  </div>

</div>

</body>
</html>
